# habitmaxxing is now a CLIENT-ONLY deployment. Its backend moved into the
# shared platform server (../ruudjuffermans-server → api.ruudjuffermans.nl),
# and all auth UI moved to the account app (../ruudjuffermans-account →
# account.ruudjuffermans.nl). The server/ directory in this repo is legacy and
# no longer deployed.
services:
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.ruudjuffermans.nl}
        VITE_ACCOUNT_URL: ${VITE_ACCOUNT_URL:-https://account.ruudjuffermans.nl}
        VITE_APP_TZ: ${VITE_APP_TZ:-Europe/Amsterdam}
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  # Dokploy's proxy network; Traefik routes habit.ruudjuffermans.nl here
  # (renamed from the old app.ruudjuffermans.nl subdomain).
  dokploy-network:
    external: true
