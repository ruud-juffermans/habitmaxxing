services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habitmaxxing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habitmaxxing}
      POSTGRES_DB: ${POSTGRES_DB:-habitmaxxing}
    volumes:
      - habitmaxxing_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habitmaxxing} -d ${POSTGRES_DB:-habitmaxxing}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://habitmaxxing:habitmaxxing@db:5432/habitmaxxing?schema=public}
      SERVER_PORT: ${SERVER_PORT:-3001}
      APP_TZ: ${APP_TZ:-Europe/Amsterdam}
      APP_URL: ${APP_URL:-http://localhost:5173}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      EMAIL_VERIFICATION_TTL_HOURS: ${EMAIL_VERIFICATION_TTL_HOURS:-24}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-60}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-habitmaxxing_session}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-habitmaxxing <no-reply@habitmaxxing.local>}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-demo@habitmaxxing.local}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-password123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    ports:
      - "127.0.0.1:${SERVER_PORT:-3001}:3001"
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run dev"

  client:
    build: ./client
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_APP_TZ: ${VITE_APP_TZ:-Europe/Amsterdam}
    ports:
      - "127.0.0.1:${CLIENT_PORT:-5173}:5173"
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
    depends_on:
      - server

volumes:
  habitmaxxing_pgdata:
