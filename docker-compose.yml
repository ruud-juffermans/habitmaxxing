services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Shared Postgres instance (provisioned by ruudjuffermans-infra), own database.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/habitmaxxing?schema=public
      SERVER_PORT: 4000
      APP_TZ: ${APP_TZ:-Europe/Amsterdam}
      APP_URL: ${APP_URL:-https://app.ruudjuffermans.nl}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://app.ruudjuffermans.nl}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      EMAIL_VERIFICATION_TTL_HOURS: ${EMAIL_VERIFICATION_TTL_HOURS:-24}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-60}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-habitmaxxing_session}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-habitmaxxing <no-reply@app.ruudjuffermans.nl>}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      # Shared secret that lets the central admin app (ruudjuffermans-infra) call
      # /api/admin/* machine-to-machine. Must match the admin app's value. Empty
      # disables the service path (only session admins allowed).
      ADMIN_SERVICE_TOKEN: ${ADMIN_SERVICE_TOKEN:-}
    # Run migrations + seed against the shared DB, then start the compiled server.
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm start"
    networks:
      # "backend" to reach the db; "dokploy-network" so Traefik can route /api/*.
      - backend
      - dokploy-network

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-https://app.ruudjuffermans.nl}
        VITE_APP_TZ: ${VITE_APP_TZ:-Europe/Amsterdam}
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  # Shared DB network created by the ruudjuffermans-infra stack; bring it up first.
  backend:
    external: true
  # Dokploy's proxy network; Traefik routes public traffic to services on it.
  dokploy-network:
    external: true
